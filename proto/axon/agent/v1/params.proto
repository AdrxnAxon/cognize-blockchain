syntax = "proto3";
package axon.agent.v1;

option go_package = "github.com/axon-chain/axon/x/agent/types";

import "gogoproto/gogo.proto";

message Params {
  uint64 min_register_stake = 1;
  uint64 register_burn_amount = 2;
  uint64 contract_deploy_burn = 3;
  uint64 initial_reputation = 4;
  uint64 max_reputation = 5;
  int64 heartbeat_interval = 6;
  int64 heartbeat_timeout = 7;
  uint64 epoch_length = 8;
  int64 ai_challenge_window = 9;
  uint64 contribution_cap_bps = 10;

  // Mining formula (M1)
  string alpha = 11;  // default "0.5", range [0.3, 0.7]
  string beta = 12;   // default "1.5", range [0.5, 3.0]
  int64 r_max = 13;   // default 100, range [50, 200]

  // Reputation tiers (M2/M3)
  int64 l1_cap = 14;              // default 40, range [20, 60]
  int64 l2_cap = 15;              // default 30, range [10, 50]
  string l1_decay_per_epoch = 16; // default "0.1", range [0, 1.0]
  string l2_decay_per_epoch = 17; // default "0.05", range [0, 0.5]

  // L2 evaluation (M5-M8)
  int64 l2_min_reporter_rep = 18;       // default 30, range [10, 50]
  int64 l2_min_account_age = 19;        // default 120960, range [0, 604800]
  string l2_budget_per_agent = 20;      // default "0.1", range [0.01, 1.0]
  int64 l2_budget_cap = 21;             // default 100, range [10, 500]
  int64 l2_abuse_threshold = 22;        // default 50, range [20, 200]
  string l2_mutual_report_penalty = 23; // default "0.1", range [0, 0.5]
  string l2_no_evidence_weight = 24;    // default "0.3", range [0, 1.0]

  // Reward distribution (M4) - basis points, sum must be 10000
  uint64 proposer_reward_bps = 25;   // default 1500 (15%)
  uint64 validator_pool_bps = 26;    // default 3500 (35%)
  uint64 reputation_pool_bps = 27;   // default 2000 (20%)
  uint64 privacy_share_bps = 29;     // default 300 (3%)
  uint64 governance_share_bps = 30;  // default 700 (7%)
  uint64 service_share_bps = 31;     // default 800 (8%)
  uint64 ai_challenge_share_bps = 32; // default 700 (7%)
  uint64 staking_share_bps = 33;     // default 500 (5%)

  // Anti-Sybil (S2)
  string contribution_cap_multiplier = 28; // default "3.0", range [1.0, 10.0]

  // Tokenomics burns (whitepaper §10.5)
  uint64 register_burn = 34;       // default 25_000_000 (25 COGNIZE) anti-sybil
  uint64 deploy_burn = 35;         // default 10_000_000 (10 COGNIZE)
  uint64 service_burn = 36;        // default 5_000_000 (5 COGNIZE)
  uint64 dataset_burn = 37;        // default 15_000_000 (15 COGNIZE)
  uint64 model_burn = 38;          // default 20_000_000 (20 COGNIZE)

  // Heartbeat penalties
  int64 missed_heartbeat_penalty1 = 39; // default -5
  int64 missed_heartbeat_penalty2 = 40; // default -15
  int64 missed_heartbeat_penalty3 = 41; // default -50
  int64 offline_penalty = 42;           // default -100
}
